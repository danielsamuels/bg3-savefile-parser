name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs, but never an in-flight master run (it may be deploying).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uvx ruff check bg3parser/ explore_lsmf.py tests/

      - name: Format check (ruff)
        run: uvx ruff format --check bg3parser/ explore_lsmf.py tests/

      - name: Type check (ty)
        run: uv run ty check bg3parser

      - name: Test (pytest)
        env:
          # The committed name table; makes the gamedata-dependent tests run
          # (and pass deterministically) without a game install.
          BG3_GAMEDATA_JSON: ${{ github.workspace }}/data/gamedata.json
        run: uv run pytest tests/ -v

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + format check (Biome)
        run: bunx biome ci ts

      - name: Type check (parser)
        run: bun run --filter '@bg3save/parser' typecheck

      - name: Type check (site)
        run: bun run --filter '@bg3save/site' typecheck

      - name: Test (parser)
        run: bun run --filter '@bg3save/parser' test

      - name: Build (site)
        run: bun run --filter '@bg3save/site' build

  deploy:
    name: Deploy
    needs: [python, typescript]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://bg3.danielfinch.co.uk
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (site)
        run: bun run --filter '@bg3save/site' build

      - name: Deploy (wrangler)
        working-directory: ts/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 53653d6594744b58c2d1414d40062f8c
        run: bunx wrangler deploy

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uvx ruff check bg3parser/ explore_lsmf.py tests/

      - name: Format check (ruff)
        run: uvx ruff format --check bg3parser/ explore_lsmf.py tests/

      - name: Type check (ty)
        run: uv run ty check bg3parser

      - name: Test (pytest)
        run: uv run pytest tests/ -v

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run typecheck --workspace=@bg3save/parser

      - name: Test
        run: npm test --workspace=@bg3save/parser

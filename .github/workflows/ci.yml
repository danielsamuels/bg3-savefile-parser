name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uvx ruff check bg3_save_reader.py tests/

      - name: Type check (ty)
        run: uv run ty check bg3_save_reader.py

      - name: Test (pytest)
        run: uv run pytest tests/ -v

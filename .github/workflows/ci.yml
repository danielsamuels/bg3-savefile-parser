name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Lint (ruff)
        run: uvx ruff check bg3_save_reader.py tests/

      - name: Type check (ty)
        run: uvx ty check bg3_save_reader.py

      - name: Test (pytest — unit tests only, no save file in CI)
        run: uv run --extra dev pytest tests/ -v -k "not requires_save"

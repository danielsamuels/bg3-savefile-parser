repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: uvx ruff check bg3parser/ explore_lsmf.py tests/
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uvx ruff format bg3parser/ explore_lsmf.py tests/
        language: system
        pass_filenames: false
      - id: ty
        name: ty type check
        entry: uv run ty check bg3parser
        language: system
        pass_filenames: false
      - id: biome
        name: biome lint + format (ts)
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bunx biome ci ts'
        language: system
        pass_filenames: false
        files: ^(ts/|biome\.json)
      - id: tsc-parser
        name: tsc @bg3save/parser
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run --filter @bg3save/parser typecheck'
        language: system
        pass_filenames: false
        files: ^ts/
      - id: tsc-site
        name: tsc @bg3save/site
        entry: bash -c 'PATH="$HOME/.bun/bin:$PATH" bun run --filter @bg3save/site typecheck'
        language: system
        pass_filenames: false
        files: ^ts/

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: uvx ruff check bg3parser/ explore_lsmf.py tests/
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uvx ruff format bg3parser/ explore_lsmf.py tests/
        language: system
        pass_filenames: false
      - id: ty
        name: ty type check
        entry: uv run ty check bg3parser
        language: system
        pass_filenames: false
